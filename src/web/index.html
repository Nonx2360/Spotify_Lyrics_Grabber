<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLG - Spotify Lyrics Grabber</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="card">
        <div class="header">SLG</div>
        <div class="song-info">
          <div id="song" class="song">Connecting...</div>
          <div id="artist" class="artist">-</div>
        </div>
        <div class="progress-row">
          <span id="time" class="time">0:00 / 0:00</span>
          <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>
        <div class="lyrics-section">
          <div id="lyrics" class="lyrics">Waiting for playback...</div>
          <div id="romaji-row" class="romaji" style="display: none;">
            <span id="romaji"></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
