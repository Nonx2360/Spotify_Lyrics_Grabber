<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLG - Spotify Lyrics Grabber</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="terminal">
        <div class="header">SLG - Spotify Lyrics Grabber</div>
        <div class="row">
          <span class="label">song:</span>
          <span id="song">Connecting...</span>
        </div>
        <div class="row">
          <span class="label">artist:</span>
          <span id="artist">-</span>
        </div>
        <div class="row">
          <span class="label">time:</span>
          <span id="time">00:00 | 00:00</span>
        </div>
        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="row lyric-row">
          <span class="label">lyrics(LIVE):</span>
          <span id="lyrics">Waiting for playback...</span>
        </div>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
